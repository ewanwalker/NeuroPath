<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>NeuroPath</title>
  </head>
  <body>
    <header class="np-header">
      <h1 class="np-title">NeuroPath</h1>
      <div class="np-status">
        <span class="np-dot" id="api-dot"></span>
        <span id="api-health">checking...</span>
      </div>
    </header>

    <div id="render-container">
      <img id="brain-render" hidden>
      <div id="render-placeholder"><span>No scan loaded</span></div>
    </div>
    <input type="range" id="slice-slider" min="0" value="0" style="display:none; width:100%">
    <div class="controls">
      <label>
        Axis
        <select id="axis-select">
          <option value="2">Axial (z)</option>
          <option value="0">Sagittal (x)</option>
          <option value="1">Coronal (y)</option>
        </select>
      </label>
      <label>
        Step
        <input type="number" id="step-input" value="1" min="1" max="10">
      </label>
    </div>
    <button id="file-upload">Upload File</button>
    <script src="/js/scripts.js" defer></script>
  </body>
  <footer>
    <p>NeuroPath &copy; 2026</p>
  </footer>
</html>
