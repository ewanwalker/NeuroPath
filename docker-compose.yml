services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - ./structural_pipeline.sh:/app/structural_pipeline.sh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  app_data:
